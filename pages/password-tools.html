<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Tools | SecureSphere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/password-tools.css">

</head>

<body>

    <main>

        <section class="password-hero">

            <div class="container">

                <h1>🔐 Password Tools</h1>

                <p>
                    Generate secure passwords, check password strength,
                    and improve your online security.
                </p>

            </div>

        </section>

        <section class="generator-section">

            <div class="container">

                <div class="generator-card">

                    <h2>Password Generator</h2>

                    <!-- Password Display -->

                    <div class="password-display">

                        <input type="text" id="generated-password" placeholder="Your password will appear here"
                            readonly>

                        <button id="copy-btn">
                            📋
                        </button>

                    </div>

                    <!-- Password Length -->

                    <div class="mt-4">

                        <label>
                            Password Length
                        </label>

                        <input type="range" id="length" min="8" max="30" value="16" class="form-range">

                        <p>
                            Length :
                            <span id="length-value">
                                16
                            </span>
                        </p>

                    </div>

                    <!-- Options -->

                    <div class="form-check">

                        <input class="form-check-input" type="checkbox" checked id="uppercase">

                        <label class="form-check-label">
                            Uppercase Letters
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input" type="checkbox" checked id="lowercase">

                        <label class="form-check-label">
                            Lowercase Letters
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input" type="checkbox" checked id="numbers">

                        <label class="form-check-label">
                            Numbers
                        </label>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input" type="checkbox" checked id="symbols">

                        <label class="form-check-label">
                            Symbols
                        </label>

                    </div>

                    <button class="btn btn-primary mt-4 w-100" id="generate-btn">

                        Generate Password

                    </button>

                    <!-- Password Strength -->

                    <div class="strength-container mt-4">

                        <label>Password Strength</label>

                        <div class="progress">

                            <div id="strength-bar" class="progress-bar" style="width:0%">
                            </div>

                        </div>

                        <p id="strength-text" class="mt-2">
                            Strength : -
                        </p>

                    </div>

                </div>

            </div>

        </section>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/password-tools.js"></script>

</body>

</html>
