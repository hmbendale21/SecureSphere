<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Strength Analyzer| SecureSphere</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- security tools CSS -->
    <link rel="stylesheet" href="../assets/css/password-analyzer.css">

</head>

<body>

    <a class="nav-link" href="security-tools.html">
        Security Tools
    </a>

    <!-- ========================= -->
    <!-- Password Analyzer -->
    <!-- ========================= -->
    
    <section class="dashboard-content py-5">
    
        <div class="container">
    
            <div class="row justify-content-center">
    
                <div class="col-lg-8">
    
                    <div class="dashboard-card">
    
                        <h3 class="mb-4">
    
                            <i class="bi bi-shield-lock"></i>
    
                            Password Analyzer
    
                        </h3>
    
                        <!-- Password -->
    
                        <label class="form-label">
    
                            Enter Password
    
                        </label>
    
                        <div class="input-group mb-4">
    
                            <input
                                type="password"
                                class="form-control form-control-lg"
                                id="passwordInput"
                                placeholder="Enter your password">
    
                            <button
                                class="btn btn-outline-info"
                                id="togglePassword">
    
                                <i class="bi bi-eye"></i>
    
                            </button>
    
                        </div>
    
                        <!-- Strength -->
    
                        <label class="form-label">
    
                            Strength
    
                        </label>
    
                        <div class="progress mb-3" style="height:14px;">
    
                            <div
                                class="progress-bar"
                                id="strengthBar"
                                style="width:0%;">
    
                            </div>
    
                        </div>
    
                        <h5 id="strengthText">
    
                            Waiting for password...
    
                        </h5>
    
                        <hr>
    
                        <!-- Results -->
    
                        <div class="row">
    
                            <div class="col-md-6">
    
                                <h6>
    
                                    Security Score
    
                                </h6>
    
                                <h4 id="score">
    
                                    0 / 100
    
                                </h4>
    
                            </div>
    
                            <div class="col-md-6">
    
                                <h6>
    
                                    Entropy
    
                                </h6>
    
                                <h4 id="entropy">
    
                                    0 Bits
    
                                </h4>
    
                            </div>
    
                        </div>
    
                        <hr>
    
                        <div class="row">
    
                            <div class="col-md-6">
    
                                <h6>
    
                                    Estimated Crack Time
    
                                </h6>
    
                                <h4 id="crackTime">
    
                                    Unknown
    
                                </h4>
    
                            </div>
    
                            <div class="col-md-6">
    
                                <h6>
    
                                    Security Level
    
                                </h6>
    
                                <h4 id="riskLevel">
    
                                    --
    
                                </h4>
    
                            </div>
    
                        </div>
    
                        <hr>
    
                        <h5>
    
                            Recommendations
    
                        </h5>
    
                        <ul id="suggestions">
    
                            <li>Start typing your password...</li>
    
                        </ul>
    
                    </div>
    
                </div>
    
            </div>
    
        </div>
    
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/password-analyzer.js"></script>

</body>

</html>
